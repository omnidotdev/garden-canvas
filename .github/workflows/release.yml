name: Release 🏗️

# Manual-only: the package is consumed as a git dependency (committed build/),
# not published to npm, so this no longer runs on push. Trigger by hand only if
# npm publishing is ever wired up (needs an @omnidotdev NPM_TOKEN).
on:
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Handle release 🦋
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Update npm
        run: npm install -g npm@latest
      - name: Install dependencies
        run: bun i
      - name: Create release PR or publish package
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bun release
          title: "feature(release): version packages"
          commit: "ci(changesets): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
      - name: Type check
        run: bunx tsc --noEmit

      - name: Knip
        run: bun knip

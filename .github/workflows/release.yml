name: Release 🏗️

# Manual-only. Omni's own apps consume this as a git dependency, pinning a
# commit (which is why build/ is committed), so a release is not needed to ship
# them a change and publishing on every push would only churn the registry.
# Publishing still matters for everyone outside Omni installing from npm, so
# release by hand once a batch of changes is worth a version.
#
# NPM_TOKEN is a repository secret, mirroring the Bitwarden item "NPM Omni
# Changesets publish token". It EXPIRES 2026-10-11, and npm is phasing out
# tokens that bypass 2FA (which this one does), so a release failing here with
# ENEEDAUTH or a 404 on PUT most likely means the token lapsed rather than
# anything wrong with the package. Configuring npm trusted publishing (OIDC)
# for @omnidotdev/garden retires the token entirely and is the durable fix:
# npmjs.com -> the package -> Settings -> Trusted Publisher -> GitHub Actions,
# naming this repo and release.yml. The id-token permission below is already
# what OIDC needs.
on:
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Handle release 🦋
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      # registry-url is what writes the .npmrc that reads NODE_AUTH_TOKEN below;
      # without it the publish reaches npm unauthenticated and fails ENEEDAUTH
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Update npm
        run: npm install -g npm@latest
      - name: Install dependencies
        run: bun i
      - name: Create release PR or publish package
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bun release
          title: "feature(release): version packages"
          commit: "ci(changesets): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
      - name: Type check
        run: bunx tsc --noEmit

      - name: Knip
        run: bun knip

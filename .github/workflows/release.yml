name: Release 🏗️

# Manual-only. Omni's own apps consume this as a git dependency, pinning a
# commit (which is why build/ is committed), so a release is not needed to ship
# them a change and publishing on every push would only churn the registry.
# Publishing still matters for everyone outside Omni installing from npm, so
# release by hand once a batch of changes is worth a version. NPM_TOKEN is
# already configured as a repository secret.
on:
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Handle release 🦋
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Update npm
        run: npm install -g npm@latest
      - name: Install dependencies
        run: bun i
      - name: Create release PR or publish package
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bun release
          title: "feature(release): version packages"
          commit: "ci(changesets): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
      - name: Type check
        run: bunx tsc --noEmit

      - name: Knip
        run: bun knip
